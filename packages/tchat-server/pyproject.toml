[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tchat-server"
version = "0.18.4"
description = "tchat — server"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "leberton" }]
dependencies = [
    "tchat-shared",
    "typer>=0.24.1",
]

[project.scripts]
tchat-server = "tchat_server.server:main"

[tool.uv.sources]
tchat-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["tchat_server"]
