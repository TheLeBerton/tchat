[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tchat-shared"
version = "0.15.1"
description = "tchat — shared protocol, config, logger"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "leberton" }]
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["tchat_shared"]
include = ["tchat_shared/**/*.toml"]
